<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Compact Components Demo</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  font-size: 13px;
  line-height: 1.4;
  background: #fff;
  color: #222;
}

.demo-app {
  padding: 20px;
}

.demo-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
  max-width: 1220px;
  margin: 0 auto;
}

.section {
  border: 1px solid #ccc;
  border-radius: 6px;
  background: #fafafa;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-width: 0;
}

h1 {
  font-size: 20px;
  grid-column: 1 / -1;
  margin-bottom: 20px;
}

h2 {
  font-size: 16px;
  margin: 0;
  padding-bottom: 8px;
  border-bottom: 1px solid #ddd;
}

.row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.stack {
  display: grid;
  gap: 10px;
}

@media (max-width: 760px) {
  .demo-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>
<div class="demo-app">
  <div class="demo-grid" id="demoMain">
    <h1>Web component library demo</h1>
  </div>
</div>

<script type="module">
  // Import components themselves so they are registered
  import './components/main.js'

  // Import demo orchestrator
  import { renderDemos } from './components/demoCommon.js'

  // Import individual demo files
  import './components/Button/Button.demo.js'
  import './components/Checkbox/Checkbox.demo.js'
  import './components/Navbar/Navbar.demo.js'
  import './components/Tabs/Tabs.demo.js'
  import './components/AudioPlayer/AudioPlayer.demo.js'
  import './components/AudioRecorder/AudioRecorder.demo.js'

  const demoMain = document.getElementById('demoMain')
  renderDemos(demoMain)
</script>
</body>
</html>
