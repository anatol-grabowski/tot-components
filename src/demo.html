<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Compact Components Demo</title>
<link id="themeStylesheet" rel="stylesheet" href="./themes/light.css">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
}

body {
  font-family: var(--tot-font-sans, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif);
  font-size: var(--tot-font-size-small, 13px);
  line-height: var(--tot-line-height-normal, 1.4);
  background: var(--tot-color-neutral-0, #fff);
  color: var(--tot-color-neutral-900, #222);
}

.demo-app {
  padding: 0 var(--tot-spacing-large, 20px) calc(var(--event-panel-space, 0px) + var(--tot-spacing-large, 20px));
}

.demo-header {
  margin: 0 calc(-1 * var(--tot-spacing-large, 20px));
  position: sticky;
  top: 0;
  z-index: calc(var(--tot-z-index-navbar, 700) + 1); /* ensure navbars in Navbar.demo.js are below the main demo navbar */
}

.demo-header tot-navbar {
  display: block;
  width: 100%;
}

.demo-title {
  color: var(--tot-input-color, #222);
  font-size: var(--tot-font-size-large, 1.125rem);
  font-weight: var(--tot-font-weight-semibold, 600);
  white-space: nowrap;
}

.demo-nav-actions {
  align-items: center;
  display: inline-flex;
  gap: var(--tot-spacing-x-small, .5rem);
}

.demo-shell {
  display: grid;
  gap: var(--tot-spacing-small, 14px);
  margin: 0 auto;
  max-width: 1220px;
  padding-top: var(--tot-spacing-small, 14px);
}

.demo-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: var(--tot-spacing-medium, 16px);
}

.section {
  border: var(--tot-panel-border-width, 1px) solid var(--tot-panel-border-color, #ccc);
  border-radius: var(--tot-border-radius-large, 6px);
  background: var(--tot-panel-background-color, #fafafa);
  padding: var(--tot-spacing-medium, 16px);
  display: flex;
  flex-direction: column;
  gap: var(--tot-spacing-small, 12px);
  min-width: 0;
  scroll-margin-top: calc(var(--tot-navbar-height, 2.75rem) + var(--tot-spacing-small, 12px));
}

h2 {
  font-size: var(--tot-font-size-medium, 16px);
  margin: 0;
  padding-bottom: var(--tot-spacing-x-small, 8px);
  border-bottom: var(--tot-panel-border-width, 1px) solid var(--tot-color-neutral-200, #ddd);
}

.row {
  display: flex;
  align-items: center;
  gap: var(--tot-spacing-x-small, 10px);
  flex-wrap: wrap;
}

.inline-control-row {
  align-items: flex-start;
  flex-wrap: nowrap;
}

.inline-labeled-control-row {
  align-items: flex-end;
}

.inline-control-row > tot-input,
.inline-control-row > tot-checkbox,
.inline-control-row > tot-select,
.inline-control-row > tot-horizontal-select {
  flex: 1 1 auto;
  min-width: 0;
}

.inline-control-row > tot-button {
  flex: 0 0 auto;
}

.inline-checkbox-row > tot-checkbox {
  margin-block-start: calc((var(--tot-input-height-medium, 2.25rem) - var(--tot-toggle-size-medium, 1.125rem)) / 2);
}

.stack {
  display: grid;
  gap: var(--tot-spacing-x-small, 10px);
  max-width: 100%;
  min-width: 0;
}

.demo-group {
  gap: var(--tot-spacing-2x-small, 6px);
  max-width: 100%;
  min-width: 0;
}

.demo-scroll-host {
  max-width: 100%;
  min-width: 0;
  overflow: hidden;
}

.demo-scroll-host > tot-navbar,
.demo-scroll-host > tot-tabs {
  display: block;
  min-width: 0;
  width: 100%;
}

.demo-label {
  color: var(--tot-color-neutral-600, #666);
  font-size: var(--tot-font-size-x-small, 12px);
  font-weight: var(--tot-font-weight-semibold, 600);
}

.demo-native-button {
  border: var(--tot-input-border-width, 1px) solid var(--tot-input-border-color, #ccc);
  border-radius: var(--tot-input-border-radius-medium, 4px);
  background: var(--tot-input-background-color, #fff);
  color: var(--tot-input-color, #222);
  cursor: pointer;
  font: inherit;
  min-height: var(--tot-input-height-small, 30px);
  padding: 0 var(--tot-input-spacing-small, 10px);
}

.demo-native-button:hover {
  background: var(--tot-input-background-color-hover, #f3f4f6);
  border-color: var(--tot-input-border-color-hover, #999);
}

.demo-native-button:focus-visible {
  outline: var(--tot-focus-ring, solid 3px hsl(198.6 88.7% 48.4% / 40%));
  outline-offset: var(--tot-focus-ring-offset, 1px);
}

.event-panel {
  border: var(--tot-panel-border-width, 1px) solid var(--tot-panel-border-color, #ccc);
  border-radius: var(--tot-border-radius-large, 6px);
  background: var(--tot-panel-background-color, #fafafa);
  box-shadow: var(--tot-shadow-large, 0 10px 30px rgb(15 23 42 / 18%));
  bottom: max(var(--tot-spacing-x-small, 10px), env(safe-area-inset-bottom));
  display: grid;
  gap: var(--tot-spacing-x-small, 8px);
  grid-template-rows: auto auto minmax(0, 1fr);
  height: min(34vh, 320px);
  left: max(var(--tot-spacing-x-small, 10px), env(safe-area-inset-left));
  margin: 0 auto;
  max-height: min(70vh, 520px);
  max-width: 1220px;
  min-height: 160px;
  overflow: hidden;
  padding: var(--tot-spacing-x-small, 10px);
  position: fixed;
  right: max(var(--tot-spacing-x-small, 10px), env(safe-area-inset-right));
  z-index: var(--tot-z-index-overlay, 1100);
}

.event-panel[hidden] {
  display: none;
}

.event-resize-handle {
  cursor: ns-resize;
  height: var(--tot-spacing-x-small, 8px);
  margin: calc(-1 * var(--tot-spacing-x-small, 10px)) calc(-1 * var(--tot-spacing-x-small, 10px)) 0;
  touch-action: none;
}

.event-resize-handle::before {
  background: var(--tot-panel-border-color, #ccc);
  border-radius: var(--tot-border-radius-pill, 999px);
  content: '';
  display: block;
  height: 3px;
  margin: 3px auto 0;
  width: 46px;
}

.event-panel-header {
  align-items: center;
  display: flex;
  gap: var(--tot-spacing-x-small, 10px);
  justify-content: space-between;
}

.event-panel-title {
  align-items: center;
  display: inline-flex;
  gap: var(--tot-spacing-2x-small, 6px);
  min-width: 0;
}

.event-log {
  align-content: start;
  display: grid;
  gap: var(--tot-spacing-2x-small, 6px);
  min-height: 0;
  overflow: auto;
  padding: 0;
}

.event-log-entry {
  border: var(--tot-panel-border-width, 1px) solid var(--tot-color-neutral-200, #ddd);
  border-radius: var(--tot-border-radius-medium, 4px);
  background: var(--tot-input-background-color, #fff);
  color: var(--tot-input-color, #222);
  display: grid;
  gap: var(--tot-spacing-3x-small, 2px);
  padding: var(--tot-spacing-2x-small, 6px) var(--tot-spacing-x-small, 8px);
}

.event-log-main {
  display: flex;
  align-items: center;
  gap: var(--tot-spacing-x-small, 8px);
  flex-wrap: wrap;
}

.event-log-time,
.event-log-source,
.event-empty {
  color: var(--tot-color-neutral-600, #666);
}

.event-log-detail {
  color: var(--tot-color-neutral-700, #444);
  font-family: var(--tot-font-mono, monospace);
  font-size: var(--tot-font-size-x-small, 12px);
  overflow-wrap: anywhere;
}

@media (max-width: 760px) {
  .demo-app {
    padding: 0 var(--tot-spacing-small, 12px) calc(var(--event-panel-space, 0px) + var(--tot-spacing-small, 12px));
  }

  .demo-header {
    margin: 0 calc(-1 * var(--tot-spacing-small, 12px));
  }

  .demo-grid {
    grid-template-columns: 1fr;
  }

  .demo-title {
    font-size: var(--tot-font-size-medium, 1rem);
  }

  .demo-nav-actions {
    gap: var(--tot-spacing-2x-small, .25rem);
  }
}
</style>
</head>
<body class="tot-theme-light">
<div class="demo-app">
  <header class="demo-header">
    <tot-navbar id="demoNavbar" aria-label="Demo sections">
      <span class="demo-title" slot="prefix">tot-components</span>
      <span class="demo-nav-actions" slot="suffix">
        <tot-button id="logsButton" size="small" label="Show logs"></tot-button>
        <tot-theme-selector id="themeSelector" size="small"></tot-theme-selector>
      </span>
    </tot-navbar>
  </header>

  <div class="demo-shell">
    <main class="demo-grid" id="demoMain"></main>
  </div>
</div>

<section class="event-panel" id="eventPanel" aria-label="Component event log" hidden>
  <span class="event-resize-handle" id="eventResizeHandle" aria-hidden="true"></span>
  <div class="event-panel-header">
    <strong class="event-panel-title">Component event log <span id="eventCount">0</span></strong>
    <tot-button id="clearEventsButton" size="small" label="Clear"></tot-button>
  </div>
  <div class="event-log" id="eventLog">
    <div class="event-empty">No events yet.</div>
  </div>
</section>

<script type="module">
  import './components/index.js'
  import './components/demoIndex.js'
  import { getRegisteredDemos, renderDemos, setDemoLogger } from './components/demoCommon.js'

  const demoMain = document.getElementById('demoMain')
  const demoNavbar = document.getElementById('demoNavbar')
  const logsButton = document.getElementById('logsButton')
  const eventCount = document.getElementById('eventCount')
  const eventLog = document.getElementById('eventLog')
  const clearEventsButton = document.getElementById('clearEventsButton')
  const eventPanel = document.getElementById('eventPanel')
  const eventResizeHandle = document.getElementById('eventResizeHandle')
  let eventsLogged = 0
  let logsVisible = false

  setDemoLogger((entry) => {
    appendEventLog(entry.source, entry.eventName, entry.detail, entry.time)
  })

  renderDemos(demoMain)
  setupDemoNavbar()

  logsButton.addEventListener('click', () => {
    logsVisible = !logsVisible
    eventPanel.hidden = !logsVisible
    logsButton.setAttribute('label', logsVisible ? 'Hide logs' : 'Show logs')
    logsButton.setAttribute('aria-pressed', String(logsVisible))
    updateEventPanelSpace()
  })

  clearEventsButton.addEventListener('click', () => {
    eventsLogged = 0
    eventCount.textContent = '0'
    eventLog.innerHTML = '<div class="event-empty">No events yet.</div>'
  })

  window.addEventListener('resize', () => updateEventPanelSpace())
  new ResizeObserver(() => updateEventPanelSpace()).observe(eventPanel)
  updateEventPanelSpace()

  eventResizeHandle.addEventListener('click', (event) => {
    event.preventDefault()
    event.stopPropagation()
  })

  eventResizeHandle.addEventListener('pointerdown', (event) => {
    event.stopPropagation()
    event.preventDefault()
    const startY = event.clientY
    const startHeight = eventPanel.getBoundingClientRect().height
    const minHeight = 160
    const maxHeight = Math.min(window.innerHeight * .7, 520)

    eventResizeHandle.setPointerCapture(event.pointerId)

    function handlePointerMove(moveEvent) {
      const nextHeight = Math.max(minHeight, Math.min(maxHeight, startHeight + startY - moveEvent.clientY))
      eventPanel.style.height = `${nextHeight}px`
      updateEventPanelSpace()
    }

    function handlePointerUp(upEvent) {
      eventResizeHandle.releasePointerCapture(upEvent.pointerId)
      eventResizeHandle.removeEventListener('pointermove', handlePointerMove)
      eventResizeHandle.removeEventListener('pointerup', handlePointerUp)
      eventResizeHandle.removeEventListener('pointercancel', handlePointerUp)
    }

    eventResizeHandle.addEventListener('pointermove', handlePointerMove)
    eventResizeHandle.addEventListener('pointerup', handlePointerUp)
    eventResizeHandle.addEventListener('pointercancel', handlePointerUp)
  })

  function setupDemoNavbar() {
    const sections = getRegisteredDemos()
    const items = []

    for (let i = 0; i < sections.length; i++) {
      items.push({
        value: sections[i].id,
        label: sections[i].title,
      })
    }

    demoNavbar.items = items
    if (items.length > 0) {
      demoNavbar.value = items[0].value
    }

    demoNavbar.addEventListener('change', (event) => {
      const target = getDemoSection(event.detail.value)
      if (!target) {
        return
      }

      target.scrollIntoView({
        behavior: 'smooth',
        block: 'start',
      })
    })
  }

  function getDemoSection(id) {
    const sections = demoMain.querySelectorAll('.section')
    for (let i = 0; i < sections.length; i++) {
      if (sections[i].dataset.section === id) {
        return sections[i]
      }
    }
    return null
  }

  function updateEventPanelSpace() {
    if (eventPanel.hidden) {
      document.documentElement.style.setProperty('--event-panel-space', '0px')
      return
    }

    const rect = eventPanel.getBoundingClientRect()
    const bottom = Math.max(10, window.innerHeight - rect.bottom)
    document.documentElement.style.setProperty('--event-panel-space', `${Math.ceil(rect.height + bottom)}px`)
  }

  function appendEventLog(source, eventName, detail, time) {
    eventsLogged += 1
    eventCount.textContent = String(eventsLogged)

    const empty = eventLog.querySelector('.event-empty')
    if (empty) {
      empty.remove()
    }

    const row = document.createElement('div')
    row.className = 'event-log-entry'

    const main = document.createElement('div')
    main.className = 'event-log-main'

    const timeNode = document.createElement('span')
    timeNode.className = 'event-log-time'
    timeNode.textContent = formatLogTime(time)

    const sourceNode = document.createElement('strong')
    sourceNode.className = 'event-log-source'
    sourceNode.textContent = formatSource(source)

    const eventNode = document.createElement('span')
    eventNode.textContent = eventName

    const detailNode = document.createElement('div')
    detailNode.className = 'event-log-detail'
    detailNode.textContent = formatDetail(detail)

    main.appendChild(timeNode)
    main.appendChild(sourceNode)
    main.appendChild(eventNode)
    row.appendChild(main)
    row.appendChild(detailNode)
    eventLog.prepend(row)
  }

  function formatSource(source) {
    if (source instanceof HTMLElement) {
      return source.localName
    }
    return String(source || 'component')
  }

  function formatDetail(detail) {
    if (!detail || Object.keys(detail).length === 0) {
      return '{}'
    }

    return JSON.stringify(detail, getJsonValue, 2)
  }

  function getJsonValue(key, value) {
    if (value instanceof Blob) {
      return `[Blob ${value.type || 'unknown'} ${value.size} bytes]`
    }

    if (value instanceof HTMLElement) {
      return value.localName
    }

    if (value instanceof EventTarget) {
      return '[EventTarget]'
    }

    return value
  }

  function formatLogTime(time) {
    return time.toLocaleTimeString([], {
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
    })
  }
</script>
</body>
</html>
