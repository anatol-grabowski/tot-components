<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Compact Components Demo</title>
<link id="themeStylesheet" rel="stylesheet" href="./themes/light.css">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
}

body {
  font-family: var(--tot-font-sans, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif);
  font-size: 13px;
  line-height: 1.4;
  background: var(--tot-color-neutral-0, #fff);
  color: var(--tot-color-neutral-900, #222);
}

.demo-app {
  padding: 0 20px calc(var(--event-panel-space, 0px) + 20px);
}

.demo-header {
  background: color-mix(in srgb, var(--tot-color-neutral-0, #fff) 94%, transparent);
  border-bottom: var(--tot-panel-border-width, 1px) solid var(--tot-panel-border-color, #ddd);
  box-shadow: var(--tot-shadow-small, 0 1px 2px rgb(15 23 42 / 8%));
  margin: 0 -20px;
  padding: 8px 20px;
  position: sticky;
  top: 0;
  z-index: 200;
}

.demo-shell,
.demo-topbar {
  max-width: 1220px;
  margin: 0 auto;
}

.demo-shell {
  display: grid;
  gap: 14px;
  padding-top: 14px;
}

.demo-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.demo-topbar h1 {
  font-size: 20px;
  margin: 0;
}

.demo-topbar-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.demo-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
}

.section {
  border: var(--tot-panel-border-width, 1px) solid var(--tot-panel-border-color, #ccc);
  border-radius: var(--tot-border-radius-large, 6px);
  background: var(--tot-panel-background-color, #fafafa);
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-width: 0;
}

h2 {
  font-size: 16px;
  margin: 0;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--tot-color-neutral-200, #ddd);
}

.row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.stack {
  display: grid;
  gap: 10px;
  max-width: 100%;
  min-width: 0;
}

.demo-group {
  gap: 6px;
  max-width: 100%;
  min-width: 0;
}

.demo-scroll-host {
  max-width: 100%;
  min-width: 0;
  overflow: hidden;
}

.demo-scroll-host > tot-navbar,
.demo-scroll-host > tot-tabs {
  display: block;
  min-width: 0;
  width: 100%;
}

.demo-label {
  color: var(--tot-color-neutral-600, #666);
  font-size: 12px;
  font-weight: 600;
}

.demo-native-button,
.event-clear-button {
  border: var(--tot-input-border-width, 1px) solid var(--tot-input-border-color, #ccc);
  border-radius: var(--tot-input-border-radius-medium, 4px);
  background: var(--tot-input-background-color, #fff);
  color: var(--tot-input-color, #222);
  cursor: pointer;
  font: inherit;
  min-height: 30px;
  padding: 4px 10px;
}

.demo-native-button:hover,
.event-clear-button:hover {
  background: var(--tot-input-background-color-hover, #f3f4f6);
  border-color: var(--tot-input-border-color-hover, #999);
}

.demo-native-button:focus-visible,
.event-clear-button:focus-visible {
  outline: var(--tot-focus-ring, solid 3px hsl(198.6 88.7% 48.4% / 40%));
  outline-offset: var(--tot-focus-ring-offset, 1px);
}

.event-panel {
  border: var(--tot-panel-border-width, 1px) solid var(--tot-panel-border-color, #ccc);
  border-radius: var(--tot-border-radius-large, 6px);
  background: var(--tot-panel-background-color, #fafafa);
  box-shadow: var(--tot-shadow-large, 0 10px 30px rgb(15 23 42 / 18%));
  bottom: max(10px, env(safe-area-inset-bottom));
  display: grid;
  gap: 8px;
  grid-template-rows: auto auto minmax(0, 1fr);
  height: min(34vh, 320px);
  left: max(10px, env(safe-area-inset-left));
  margin: 0 auto;
  max-height: min(70vh, 520px);
  max-width: 1220px;
  min-height: 160px;
  overflow: hidden;
  padding: 10px;
  position: fixed;
  right: max(10px, env(safe-area-inset-right));
  z-index: 100;
}

.event-panel[hidden] {
  display: none;
}

.event-resize-handle {
  cursor: ns-resize;
  height: 8px;
  margin: -10px -10px 0;
  touch-action: none;
}

.event-resize-handle::before {
  background: var(--tot-panel-border-color, #ccc);
  border-radius: var(--tot-border-radius-pill, 999px);
  content: '';
  display: block;
  height: 3px;
  margin: 3px auto 0;
  width: 46px;
}

.event-panel-header {
  align-items: center;
  display: flex;
  gap: 10px;
  justify-content: space-between;
}

.event-panel-title {
  align-items: center;
  display: inline-flex;
  gap: 6px;
  min-width: 0;
}

.event-log {
  align-content: start;
  display: grid;
  gap: 6px;
  min-height: 0;
  overflow: auto;
  padding: 0;
}

.event-log-entry {
  border: 1px solid var(--tot-color-neutral-200, #ddd);
  border-radius: var(--tot-border-radius-medium, 4px);
  background: var(--tot-input-background-color, #fff);
  color: var(--tot-input-color, #222);
  display: grid;
  gap: 2px;
  padding: 6px 8px;
}

.event-log-main {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.event-log-time,
.event-log-source,
.event-empty {
  color: var(--tot-color-neutral-600, #666);
}

.event-log-detail {
  color: var(--tot-color-neutral-700, #444);
  font-family: var(--tot-font-mono, monospace);
  font-size: 12px;
  overflow-wrap: anywhere;
}

@media (max-width: 760px) {
  .demo-app {
    padding: 0 12px calc(var(--event-panel-space, 0px) + 12px);
  }

  .demo-header {
    margin: 0 -12px;
    padding: 8px 12px;
  }

  .demo-grid {
    grid-template-columns: 1fr;
  }

  .demo-topbar {
    align-items: flex-start;
    flex-direction: column;
  }

  .demo-topbar-actions {
    justify-content: flex-start;
  }
}
</style>
</head>
<body class="tot-theme-light">
<div class="demo-app">
  <header class="demo-header">
    <div class="demo-topbar">
      <h1>Web component library demo</h1>
      <div class="demo-topbar-actions">
        <button class="demo-native-button" id="logsButton" type="button" aria-pressed="true">Hide logs</button>
        <button class="demo-native-button" id="themeButton" type="button">Use dark theme</button>
      </div>
    </div>
  </header>

  <div class="demo-shell">
    <main class="demo-grid" id="demoMain"></main>
  </div>
</div>

<section class="event-panel" id="eventPanel" aria-label="Component event log">
  <span class="event-resize-handle" id="eventResizeHandle" aria-hidden="true"></span>
  <div class="event-panel-header">
    <strong class="event-panel-title">Component event log <span id="eventCount">0</span></strong>
    <button class="event-clear-button" id="clearEventsButton" type="button">Clear</button>
  </div>
  <div class="event-log" id="eventLog">
    <div class="event-empty">No events yet.</div>
  </div>
</section>

<script type="module">
  // Import components themselves so they are registered
  import './components/index.js'

  // Import demo orchestrator
  import { renderDemos, setDemoLogger, logDemoEvent } from './components/demoCommon.js'

  // Import individual demo files
  import './components/Button/Button.demo.js'
  import './components/Checkbox/Checkbox.demo.js'
  import './components/Navbar/Navbar.demo.js'
  import './components/Tabs/Tabs.demo.js'
  import './components/AudioPlayer/AudioPlayer.demo.js'
  import './components/AudioRecorder/AudioRecorder.demo.js'
  import './components/Divider/Divider.demo.js'
  import './components/Menu/Menu.demo.js'
  import './components/Dropdown/Dropdown.demo.js'
  import './components/Input/Input.demo.js'
  import './components/FileInput/FileInput.demo.js'
  import './components/HorizontalSelect/HorizontalSelect.demo.js'

  const componentEventNames = [
    'change',
    'input',
    'select',
    'play',
    'pause',
    'loaded',
    'error',
    'seek',
    'recording-error',
    'recording-start',
    'recording-pause',
    'recording-resume',
    'recording-stop',
    'clear',
  ]

  const demoMain = document.getElementById('demoMain')
  const themeButton = document.getElementById('themeButton')
  const logsButton = document.getElementById('logsButton')
  const themeStylesheet = document.getElementById('themeStylesheet')
  const eventCount = document.getElementById('eventCount')
  const eventLog = document.getElementById('eventLog')
  const clearEventsButton = document.getElementById('clearEventsButton')
  const eventPanel = document.getElementById('eventPanel')
  const eventResizeHandle = document.getElementById('eventResizeHandle')
  let eventsLogged = 0
  let currentTheme = 'light'
  let logsVisible = true

  setDemoLogger((entry) => {
    appendEventLog(entry.source, entry.eventName, entry.detail, entry.time)
  })

  for (let i = 0; i < componentEventNames.length; i++) {
    demoMain.addEventListener(componentEventNames[i], (event) => {
      if (!(event instanceof CustomEvent) || event.__totDemoLogged) {
        return
      }

      logDemoEvent(getEventSource(event), event.type, event.detail || {})
    })
  }

  renderDemos(demoMain)

  themeButton.addEventListener('click', () => {
    currentTheme = currentTheme === 'light' ? 'dark' : 'light'
    themeStylesheet.href = `./themes/${currentTheme}.css`
    document.body.classList.toggle('tot-theme-light', currentTheme === 'light')
    document.body.classList.toggle('tot-theme-dark', currentTheme === 'dark')
    themeButton.textContent = currentTheme === 'light' ? 'Use dark theme' : 'Use light theme'
    document.dispatchEvent(new CustomEvent('tot-theme-change', {
      bubbles: true,
      detail: { theme: currentTheme },
    }))
  })

  logsButton.addEventListener('click', () => {
    logsVisible = !logsVisible
    eventPanel.hidden = !logsVisible
    logsButton.textContent = logsVisible ? 'Hide logs' : 'Show logs'
    logsButton.setAttribute('aria-pressed', String(logsVisible))
    updateEventPanelSpace()
  })

  clearEventsButton.addEventListener('click', () => {
    eventsLogged = 0
    eventCount.textContent = '0'
    eventLog.innerHTML = '<div class="event-empty">No events yet.</div>'
  })

  window.addEventListener('resize', () => updateEventPanelSpace())
  new ResizeObserver(() => updateEventPanelSpace()).observe(eventPanel)
  updateEventPanelSpace()

  eventResizeHandle.addEventListener('click', (event) => {
    event.preventDefault()
    event.stopPropagation()
  })

  eventResizeHandle.addEventListener('pointerdown', (event) => {
    event.stopPropagation()
    event.preventDefault()
    const startY = event.clientY
    const startHeight = eventPanel.getBoundingClientRect().height
    const minHeight = 160
    const maxHeight = Math.min(window.innerHeight * .7, 520)

    eventResizeHandle.setPointerCapture(event.pointerId)

    function handlePointerMove(moveEvent) {
      const nextHeight = Math.max(minHeight, Math.min(maxHeight, startHeight + startY - moveEvent.clientY))
      eventPanel.style.height = `${nextHeight}px`
      updateEventPanelSpace()
    }

    function handlePointerUp(upEvent) {
      eventResizeHandle.releasePointerCapture(upEvent.pointerId)
      eventResizeHandle.removeEventListener('pointermove', handlePointerMove)
      eventResizeHandle.removeEventListener('pointerup', handlePointerUp)
      eventResizeHandle.removeEventListener('pointercancel', handlePointerUp)
    }

    eventResizeHandle.addEventListener('pointermove', handlePointerMove)
    eventResizeHandle.addEventListener('pointerup', handlePointerUp)
    eventResizeHandle.addEventListener('pointercancel', handlePointerUp)
  })

  function updateEventPanelSpace() {
    if (eventPanel.hidden) {
      document.documentElement.style.setProperty('--event-panel-space', '0px')
      return
    }

    const rect = eventPanel.getBoundingClientRect()
    const bottom = Math.max(10, window.innerHeight - rect.bottom)
    document.documentElement.style.setProperty('--event-panel-space', `${Math.ceil(rect.height + bottom)}px`)
  }

  function appendEventLog(source, eventName, detail, time) {
    eventsLogged += 1
    eventCount.textContent = String(eventsLogged)

    const empty = eventLog.querySelector('.event-empty')
    if (empty) {
      empty.remove()
    }

    const row = document.createElement('div')
    row.className = 'event-log-entry'

    const main = document.createElement('div')
    main.className = 'event-log-main'

    const timeNode = document.createElement('span')
    timeNode.className = 'event-log-time'
    timeNode.textContent = formatLogTime(time)

    const sourceNode = document.createElement('strong')
    sourceNode.className = 'event-log-source'
    sourceNode.textContent = formatSource(source)

    const eventNode = document.createElement('span')
    eventNode.textContent = eventName

    const detailNode = document.createElement('div')
    detailNode.className = 'event-log-detail'
    detailNode.textContent = formatDetail(detail)

    main.appendChild(timeNode)
    main.appendChild(sourceNode)
    main.appendChild(eventNode)
    row.appendChild(main)
    row.appendChild(detailNode)
    eventLog.prepend(row)
  }

  function getEventSource(event) {
    const path = event.composedPath()
    for (let i = 0; i < path.length; i++) {
      const node = path[i]
      if (node instanceof HTMLElement && node.localName.startsWith('tot-')) {
        return node
      }
    }
    return event.target
  }

  function formatSource(source) {
    if (source instanceof HTMLElement) {
      return source.localName
    }
    return String(source || 'component')
  }

  function formatDetail(detail) {
    if (!detail || Object.keys(detail).length === 0) {
      return '{}'
    }

    return JSON.stringify(detail, getJsonValue, 2)
  }

  function getJsonValue(key, value) {
    if (value instanceof Blob) {
      return `[Blob ${value.type || 'unknown'} ${value.size} bytes]`
    }

    if (value instanceof HTMLElement) {
      return value.localName
    }

    if (value instanceof EventTarget) {
      return '[EventTarget]'
    }

    return value
  }

  function formatLogTime(time) {
    return time.toLocaleTimeString([], {
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
    })
  }
</script>
</body>
</html>
