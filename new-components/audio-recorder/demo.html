<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>compact-audio-recorder demo</title>
</head>
<body>
  <script type="module">
    import './CompactAudioRecorder.js'
    import '../demo-common.js'

    window.CompactDemo.render({
      title: 'compact-audio-recorder',
      cases: [
        {
          render(container, log) {
            const recorder = document.createElement('compact-audio-recorder')
            
            recorder.addEventListener('recording-start', event => log({ name:'recording-start', detail: event.detail }))
            recorder.addEventListener('recording-pause', event => log({ name:'recording-pause', detail: event.detail }))
            recorder.addEventListener('recording-resume', event => log({ name:'recording-resume', detail: event.detail }))
            recorder.addEventListener('recording-stop', event => log({ name:'recording-stop', detail: event.detail }))
            container.append(recorder)
          },
        },
      ],
    })
  </script>
</body>
</html>
