<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Compact Components Demo</title>
  <style>
    :root {
      color: #222222;
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      font-size: 14px;
      line-height: 1.35;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      background: #ffffff;
    }

    compact-navbar {
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .brand {
      font-weight: 700;
      white-space: nowrap;
    }

    .nav-actions {
      align-items: center;
      display: flex;
      gap: 4px;
    }

    .nav-action {
      background: #ffffff;
      border: 1px solid #999999;
      border-radius: 4px;
      cursor: pointer;
      min-height: 28px;
      padding: 3px 7px;
      white-space: nowrap;
    }

    .nav-action:hover {
      background: #f2f2f2;
    }

    .shell {
      display: grid;
      gap: 8px;
      margin: 0 auto;
      max-width: 1180px;
      padding: 8px;
      width: 100%;
    }

    .page[hidden] {
      display: none;
    }

    .intro {
      display: grid;
      gap: 3px;
    }

    h1,
    p {
      margin: 0;
    }

    h1 {
      font-size: 21px;
      font-weight: 700;
      line-height: 1.15;
    }

    .intro p {
      color: #666666;
      font-size: 12px;
    }

    .demos {
      display: grid;
      gap: 8px;
      grid-template-columns: minmax(0, 1fr);
    }

    .demos.two-columns {
      align-items: start;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .component-demo {
      border: 1px solid #dddddd;
      border-radius: 6px;
      display: block;
      min-width: 0;
      overflow: hidden;
      padding: 10px;
    }

    iframe {
      border: 0;
      display: block;
      min-height: 120px;
      overflow: hidden;
      width: 100%;
    }

    .empty-page {
      background: #fafafa;
      border: 1px dashed #cccccc;
      border-radius: 6px;
      color: #666666;
      font-size: 12px;
      padding: 10px;
    }

    body.hide-notes .intro p {
      display: none;
    }

    body.hide-notes .shell {
      gap: 6px;
    }

    @media (max-width: 760px) {
      .demos.two-columns {
        grid-template-columns: minmax(0, 1fr);
      }

      .component-demo {
        padding: 8px;
      }
    }
  </style>
</head>

<body>
  <compact-navbar id="mainNav" tabs="Components,Media,Data" value="Components">
    <span class="brand" slot="left">Compact Components</span>
    <span class="nav-actions" slot="right">
      <button id="notesToggle" class="nav-action" type="button">Hide notes</button>
      <button id="layoutToggle" class="nav-action" type="button">2-up</button>
    </span>
  </compact-navbar>

  <main class="shell">
    <section id="componentsPage" class="page">
      <div id="demos" class="demos"></div>
    </section>

    <section id="mediaPage" class="page" hidden>
      <div class="empty-page">Media tab kept intentionally empty.</div>
    </section>

    <section id="dataPage" class="page" hidden>
      <div class="empty-page">Data tab kept intentionally empty.</div>
    </section>
  </main>

  <script type="module">
    import './index.js'

    const componentDemos = [
      { name: 'Navbar', path: 'navbar/demo.html' },
      { name: 'Tabs', path: 'tabs/demo.html' },
      { name: 'Button', path: 'button/demo.html' },
      { name: 'Checkbox', path: 'checkbox/demo.html' },
      { name: 'Input', path: 'input/demo.html' },
      { name: 'Textarea', path: 'textarea/demo.html' },
      { name: 'File Input', path: 'file-input/demo.html' },
      { name: 'Horizontal Select', path: 'horizontal-select/demo.html' },
    ]

    const mainNav = document.getElementById('mainNav')
    const demos = document.getElementById('demos')
    const notesToggle = document.getElementById('notesToggle')
    const layoutToggle = document.getElementById('layoutToggle')

    const pages = {
      Components: document.getElementById('componentsPage'),
      Media: document.getElementById('mediaPage'),
      Data: document.getElementById('dataPage'),
    }

    const frames = []
    let hideNotes = localStorage.getItem('compactDemoHideNotes') === 'true'
    let twoColumns = localStorage.getItem('compactDemoTwoColumns') === 'true'

    function showPage(value) {
      const keys = Object.keys(pages)

      for (let i = 0; i < keys.length; i++) {
        const key = keys[i]
        pages[key].hidden = key !== value
      }
    }

    function sendVisibility(frame) {
      if (!frame.contentWindow) {
        return
      }

      frame.contentWindow.postMessage({
        type: 'compact-demo-visibility',
        hideNotes,
      }, '*')
    }

    function syncVisibility() {
      document.body.classList.toggle('hide-notes', hideNotes)
      notesToggle.textContent = hideNotes ? 'Show notes' : 'Hide notes'
      localStorage.setItem('compactDemoHideNotes', String(hideNotes))

      for (let i = 0; i < frames.length; i++) {
        sendVisibility(frames[i])
      }
    }

    function syncLayout() {
      demos.classList.toggle('two-columns', twoColumns)
      layoutToggle.textContent = twoColumns ? '1-up' : '2-up'
      localStorage.setItem('compactDemoTwoColumns', String(twoColumns))
    }

    function renderDemos() {
      demos.innerHTML = ''
      frames.length = 0

      for (let i = 0; i < componentDemos.length; i++) {
        const item = componentDemos[i]
        const section = document.createElement('section')
        const frame = document.createElement('iframe')

        section.className = 'component-demo'
        frame.title = `${item.name} demo`
        frame.src = item.path
        frame.loading = 'lazy'
        frame.addEventListener('load', () => {
          sendVisibility(frame)
        })
        frames.push(frame)
        section.append(frame)
        demos.append(section)
      }
    }

    mainNav.addEventListener('change', event => {
      showPage(event.detail.value)
    })

    notesToggle.addEventListener('click', () => {
      hideNotes = !hideNotes
      syncVisibility()
    })

    layoutToggle.addEventListener('click', () => {
      twoColumns = !twoColumns
      syncLayout()
    })

    window.addEventListener('message', event => {
      if (!event.data || event.data.type !== 'compact-component-demo-height') {
        return
      }

      for (let i = 0; i < frames.length; i++) {
        const frame = frames[i]

        if (frame.contentWindow !== event.source) {
          continue
        }

        frame.style.height = `${Math.max(120, event.data.height)}px`
        break
      }
    })

    renderDemos()
    syncLayout()
    syncVisibility()
    showPage(mainNav.getAttribute('value') || 'Components')
  </script>
</body>

</html>
