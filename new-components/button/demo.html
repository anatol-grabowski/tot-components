<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>compact-button demo</title>
</head>
<body>
  <script type="module">
    import './CompactButton.js'
    import '../demo-common.js'

    window.CompactDemo.render({
      title: 'compact-button',
      intro: 'A styled button with variants and disabled states.',
      cases: [
        {
          title: 'Variants',
          note: 'Primary, secondary, and danger variants.',
          render(container, log) {
            const row = document.createElement('div')
            row.className = 'row'

            const primary = document.createElement('compact-button')
            primary.setAttribute('variant', 'primary')
            primary.textContent = 'Primary'
            primary.addEventListener('compact-click', () => log({ event: 'compact-click', variant: 'primary' }))

            const secondary = document.createElement('compact-button')
            secondary.setAttribute('variant', 'secondary')
            secondary.textContent = 'Secondary'
            secondary.addEventListener('compact-click', () => log({ event: 'compact-click', variant: 'secondary' }))

            const danger = document.createElement('compact-button')
            danger.setAttribute('variant', 'danger')
            danger.textContent = 'Danger'
            danger.addEventListener('compact-click', () => log({ event: 'compact-click', variant: 'danger' }))

            row.append(primary, secondary, danger)
            container.append(row)
          },
        },
        {
          title: 'Disabled state',
          note: 'The disabled attribute makes the button unclickable.',
          render(container, log) {
            const btn = document.createElement('compact-button')
            btn.setAttribute('variant', 'primary')
            btn.setAttribute('disabled', '')
            btn.textContent = 'Save'
            btn.addEventListener('compact-click', () => log({ event: 'compact-click' }))
            container.append(btn)
          },
        },
      ],
    })
  </script>
</body>
</html>
