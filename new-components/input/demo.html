<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>compact-input demo</title>
</head>
<body>
  <script type="module">
    import './CompactInput.js'
    import '../demo-common.js'

    window.CompactDemo.render({
      title: 'compact-input',
      intro: 'A labeled input field.',
      cases: [
        {
          title: 'Basic use',
          note: 'Generates input and change events.',
          render(container, log) {
            const input = document.createElement('compact-input')
            input.setAttribute('label', 'Username')
            input.setAttribute('placeholder', 'Enter your name')
            input.addEventListener('input', event => log({ event: 'input', value: event.detail.value }))
            input.addEventListener('change', event => log({ event: 'change', value: event.detail.value }))
            container.append(input)
          },
        },
        {
          title: 'Type and Value',
          note: 'Set the initial value and input type.',
          render(container, log) {
            const input = document.createElement('compact-input')
            input.setAttribute('label', 'Password')
            input.setAttribute('type', 'password')
            input.setAttribute('value', 'secret')
            input.addEventListener('input', event => log(event.detail))
            container.append(input)
          },
        },
        {
          title: 'Disabled state',
          note: 'The disabled attribute makes the input read-only.',
          render(container, log) {
            const input = document.createElement('compact-input')
            input.setAttribute('label', 'Disabled field')
            input.setAttribute('value', 'Cannot be changed')
            input.setAttribute('disabled', '')
            container.append(input)
          },
        },
      ],
    })
  </script>
</body>
</html>
