<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>compact-file-input demo</title>
</head>
<body>
  <script type="module">
    import './CompactFileInput.js'
    import '../demo-common.js'

    window.CompactDemo.render({
      title: 'compact-file-input',
      intro: 'A drag-and-drop file input component.',
      cases: [
        {
          title: 'Single file',
          note: 'Allows selecting a single file.',
          render(container, log) {
            const input = document.createElement('compact-file-input')
            input.setAttribute('label', 'Upload Document')
            input.addEventListener('files-change', event => {
              const files = event.detail.files.map(f => ({ name: f.name, size: f.size, type: f.type }))
              log({ event: 'files-change', files })
            })
            container.append(input)
          },
        },
        {
          title: 'Multiple files with filter',
          note: 'Accepts multiple image files.',
          render(container, log) {
            const input = document.createElement('compact-file-input')
            input.setAttribute('label', 'Upload Images')
            input.setAttribute('accept', 'image/png, image/jpeg')
            input.setAttribute('multiple', '')
            input.addEventListener('files-change', event => {
              const files = event.detail.files.map(f => ({ name: f.name, size: f.size, type: f.type }))
              log({ event: 'files-change', files })
            })
            container.append(input)
          },
        },
      ],
    })
  </script>
</body>
</html>
