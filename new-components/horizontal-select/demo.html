<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>compact-horizontal-select demo</title>
</head>
<body>
  <script type="module">
    import './CompactHorizontalSelect.js'
    import '../demo-common.js'

    window.CompactDemo.render({
      title: 'compact-horizontal-select',
      intro: 'A horizontally scrollable selector.',
      cases: [
        {
          title: 'Basic use',
          note: 'Scroll horizontally to see all options.',
          render(container, log) {
            const select = document.createElement('compact-horizontal-select')
            select.setAttribute('options', 'Today,Yesterday,Last Week,Last Month,Last Year,All Time')
            select.setAttribute('value', 'Yesterday')
            select.addEventListener('change', event => log(event.detail))
            container.append(select)
          },
        },
        {
          title: 'JSON options with disabled item',
          note: 'Provide an array of objects to specify values and disabled states.',
          render(container, log) {
            const select = document.createElement('compact-horizontal-select')
            select.setAttribute('options', JSON.stringify([
              { value: 'sm', label: 'Small' },
              { value: 'md', label: 'Medium' },
              { value: 'lg', label: 'Large', disabled: true },
              { value: 'xl', label: 'X-Large' },
            ]))
            select.setAttribute('value', 'md')
            select.addEventListener('change', event => log(event.detail))
            container.append(select)
          },
        },
        {
          title: 'Globally disabled',
          note: 'The entire component can be disabled.',
          render(container, log) {
            const select = document.createElement('compact-horizontal-select')
            select.setAttribute('options', 'One,Two,Three')
            select.setAttribute('disabled', '')
            container.append(select)
          },
        },
      ],
    })
  </script>
</body>
</html>
