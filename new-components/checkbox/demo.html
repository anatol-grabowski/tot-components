<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>compact-checkbox demo</title>
</head>
<body>
  <script type="module">
    import './CompactCheckbox.js'
    import '../demo-common.js'

    window.CompactDemo.render({
      title: 'compact-checkbox',
      intro: 'A labeled checkbox.',
      cases: [
        {
          title: 'Basic use',
          note: 'Set a label and handle the change event.',
          render(container, log) {
            const cb = document.createElement('compact-checkbox')
            cb.setAttribute('label', 'Accept terms')
            cb.addEventListener('change', event => log(event.detail))
            container.append(cb)
          },
        },
        {
          title: 'Checked and Indeterminate states',
          note: 'Can be initialized with checked or indeterminate attributes.',
          render(container, log) {
            const row = document.createElement('div')
            row.className = 'row'

            const cb1 = document.createElement('compact-checkbox')
            cb1.setAttribute('label', 'Checked')
            cb1.setAttribute('checked', '')
            cb1.addEventListener('change', event => log(event.detail))

            const cb2 = document.createElement('compact-checkbox')
            cb2.setAttribute('label', 'Indeterminate')
            cb2.setAttribute('indeterminate', '')
            cb2.addEventListener('change', event => log(event.detail))

            row.append(cb1, cb2)
            container.append(row)
          },
        },
        {
          title: 'Disabled state',
          note: 'The disabled attribute makes the checkbox read-only.',
          render(container, log) {
            const cb = document.createElement('compact-checkbox')
            cb.setAttribute('label', 'Unavailable option')
            cb.setAttribute('checked', '')
            cb.setAttribute('disabled', '')
            cb.addEventListener('change', event => log(event.detail))
            container.append(cb)
          },
        },
      ],
    })
  </script>
</body>
</html>
