<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>compact-navbar demo</title>
</head>
<body>
  <script type="module">
    import './CompactNavbar.js'
    import '../demo-common.js'

    const manyTabs = [
      'Alpha',
      'Beta',
      'Gamma',
      'Delta',
      'Epsilon',
      'Zeta',
      'Eta',
      'Theta',
      'Iota',
      'Kappa',
    ]

    window.CompactDemo.render({
      title: 'compact-navbar',
      intro: 'A compact top navigation bar with optional left and right slots.',
      cases: [
        {
          title: 'Basic tabs',
          note: 'Comma-separated labels are enough for simple navigation.',
          render(container, log) {
            const navbar = document.createElement('compact-navbar')

            navbar.setAttribute('tabs', 'Home,Search,Settings')
            navbar.setAttribute('value', 'Home')
            navbar.addEventListener('change', event => log(event.detail))
            container.append(navbar)
            log({ value: 'Home', item: { value: 'Home', label: 'Home' } })
          },
        },
        {
          title: 'Slotted title and action',
          note: 'The left and right slots keep their natural width while the middle tab strip scrolls if needed.',
          render(container, log) {
            const navbar = document.createElement('compact-navbar')
            const brand = document.createElement('span')
            const action = document.createElement('button')

            navbar.setAttribute('tabs', JSON.stringify([
              { value: 'overview', label: 'Overview' },
              { value: 'reports', label: 'Reports' },
              { value: 'settings', label: 'Settings' },
            ]))
            navbar.setAttribute('value', 'reports')
            brand.className = 'demo-brand'
            brand.slot = 'left'
            brand.textContent = 'Demo App'
            action.className = 'demo-button'
            action.slot = 'right'
            action.type = 'button'
            action.textContent = '⚙'
            action.setAttribute('aria-label', 'Settings')
            action.addEventListener('click', () => log('Settings button clicked'))
            navbar.addEventListener('change', event => log(event.detail))
            navbar.append(brand, action)
            container.append(navbar)
          },
        },
        {
          title: 'Many tabs in a narrow container',
          note: 'Only the middle tab area scrolls horizontally; the left label and right action stay visible.',
          render(container, log) {
            const wrap = document.createElement('div')
            const navbar = document.createElement('compact-navbar')
            const label = document.createElement('span')
            const action = document.createElement('button')

            wrap.className = 'narrow'
            navbar.setAttribute('tabs', manyTabs.join(','))
            navbar.setAttribute('value', 'Epsilon')
            label.className = 'demo-label'
            label.slot = 'left'
            label.textContent = 'Left'
            action.className = 'demo-button'
            action.slot = 'right'
            action.type = 'button'
            action.textContent = 'Go'
            navbar.addEventListener('change', event => log(event.detail))
            navbar.append(label, action)
            wrap.append(navbar)
            container.append(wrap)
          },
        },
      ],
    })
  </script>
</body>
</html>
