<!DOCTYPE html>
<html>
<style>
  button {
    padding: 0 12px;
    height: 30px;
    cursor: pointer;
    white-space: nowrap;
    
    /* Trick */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  button::after {
    display: block;
    content: attr(data-label);
    font-weight: 700;
    height: 0;
    overflow: hidden;
    visibility: hidden;
    pointer-events: none;
  }
  button:hover {
    font-weight: 700;
  }
</style>
<button data-label="Hello World">Hello World</button>
<button data-label="Test">Test</button>
</html>
