<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>compact-tabs demo</title>
</head>
<body>
  <script type="module">
    import './CompactTabs.js'
    import '../demo-common.js'

    const longOptions = [
      'Alpha',
      'Beta',
      'Gamma',
      'Delta',
      'Epsilon',
      'Zeta',
      'Eta',
      'Theta',
      'Iota',
      'Kappa',
    ]

    window.CompactDemo.render({
      title: 'compact-tabs',
      intro: 'A small tab selector with selected state and disabled states.',
      cases: [
        {
          title: 'Basic options',
          note: 'Use the options attribute for a compact horizontal selector.',
          render(container, log) {
            const tabs = document.createElement('compact-tabs')

            tabs.setAttribute('options', 'Details,Activity,History')
            tabs.setAttribute('value', 'Activity')
            tabs.addEventListener('change', event => log(event.detail))
            container.append(tabs)
            log({ value: 'Activity', item: { value: 'Activity', label: 'Activity' } })
          },
        },
        {
          title: 'Disabled option',
          note: 'JSON options can include disabled items.',
          render(container, log) {
            const tabs = document.createElement('compact-tabs')

            tabs.setAttribute('options', JSON.stringify([
              { value: 'draft', label: 'Draft' },
              { value: 'review', label: 'Review' },
              { value: 'published', label: 'Published', disabled: true },
            ]))
            tabs.setAttribute('value', 'review')
            tabs.addEventListener('change', event => log(event.detail))
            container.append(tabs)
          },
        },
        {
          title: 'Many tabs in a narrow container',
          note: 'The optional side slots stay fixed; the middle tab strip scrolls horizontally with a top scrollbar.',
          render(container, log) {
            const wrap = document.createElement('div')
            const tabs = document.createElement('compact-tabs')
            const label = document.createElement('span')
            const action = document.createElement('button')

            wrap.className = 'narrow'
            tabs.setAttribute('options', longOptions.join(','))
            tabs.setAttribute('value', 'Epsilon')
            label.className = 'demo-label'
            label.slot = 'left'
            label.textContent = 'Type'
            action.className = 'demo-button'
            action.slot = 'right'
            action.type = 'button'
            action.textContent = 'Apply'
            tabs.addEventListener('change', event => log(event.detail))
            tabs.append(label, action)
            wrap.append(tabs)
            container.append(wrap)
          },
        },
        {
          title: 'Globally disabled',
          note: 'The disabled boolean attribute disables every rendered tab button.',
          render(container, log) {
            const tabs = document.createElement('compact-tabs')

            tabs.setAttribute('options', 'One,Two,Three')
            tabs.setAttribute('value', 'Two')
            tabs.setAttribute('disabled', '')
            tabs.addEventListener('change', event => log(event.detail))
            container.append(tabs)
          },
        },
      ],
    })
  </script>
</body>
</html>
