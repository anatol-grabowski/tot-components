<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Compact Components Demo</title>
  <style>
    :root {
      color: #222;
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      font-size: 14px;
      line-height: 1.4;
    }
    * {
      box-sizing: border-box;
    }
    html,
    body {
      margin: 0;
      min-height: 100%;
    }
    body {
      background: #fff;
    }
    compact-navbar {
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .brand {
      font-weight: 600;
      white-space: nowrap;
    }
    .shell {
      max-width: 1000px;
      margin: 0 auto;
      padding: 12px;
      display: grid;
      gap: 12px;
    }
    .page[hidden] {
      display: none;
    }
    .intro {
      display: grid;
      gap: 4px;
    }
    h1,
    h2,
    p {
      margin: 0;
    }
    h1 {
      font-size: 20px;
    }
    h2 {
      font-size: 16px;
    }
    .demos {
      display: grid;
      gap: 12px;
    }
    .component-demo {
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px;
      display: grid;
      gap: 8px;
      overflow: hidden;
    }
    iframe {
      display: block;
      width: 100%;
      border: 0;
      min-height: 180px;
      overflow: hidden;
    }
    .empty-page {
      border: 1px dashed #ccc;
      border-radius: 6px;
      padding: 12px;
      color: #666;
      background: #fafafa;
    }
  </style>
</head>
<body>
  <compact-navbar id="mainNav" tabs="Components,Media,Data" value="Components">
    <span class="brand" slot="left">Compact Components</span>
  </compact-navbar>

  <main class="shell">
    <section id="componentsPage" class="page">
      <div class="intro">
        <h1>Web component library demo</h1>
        <p>Each component demo is loaded from its own directory. Add one object to <code>componentDemos</code> to include another component.</p>
      </div>
      <div class="demos" id="demos"></div>
    </section>

    <section id="mediaPage" class="page" hidden>
      <div class="empty-page">Media tab kept intentionally empty.</div>
    </section>

    <section id="dataPage" class="page" hidden>
      <div class="empty-page">Data tab kept intentionally empty.</div>
    </section>
  </main>

  <script type="module">
    import './index.js'

    const componentDemos = [
      { name: 'Navbar', path: 'navbar/demo.html' },
      { name: 'Tabs', path: 'tabs/demo.html' },
    ]

    const mainNav = document.getElementById('mainNav')
    const demos = document.getElementById('demos')
    const pages = {
      Components: document.getElementById('componentsPage'),
      Media: document.getElementById('mediaPage'),
      Data: document.getElementById('dataPage'),
    }
    const framesByPath = new Map()

    function showPage(value) {
      const keys = Object.keys(pages)

      for (let i = 0; i < keys.length; i++) {
        const key = keys[i]
        pages[key].hidden = key !== value
      }
    }

    function renderDemos() {
      demos.innerHTML = ''

      for (let i = 0; i < componentDemos.length; i++) {
        const item = componentDemos[i]
        const section = document.createElement('section')
        const heading = document.createElement('h2')
        const frame = document.createElement('iframe')

        section.className = 'component-demo'
        heading.textContent = item.name
        frame.title = `${item.name} demo`
        frame.src = item.path
        frame.loading = 'lazy'

        framesByPath.set(item.path, frame)
        framesByPath.set(item.path.split('/').slice(-2).join('/'), frame)

        section.append(heading, frame)
        demos.append(section)
      }
    }

    mainNav.addEventListener('change', event => {
      showPage(event.detail.value)
    })

    window.addEventListener('message', event => {
      if (!event.data || event.data.type !== 'compact-component-demo-height') {
        return
      }

      const frame = framesByPath.get(event.data.path)

      if (!frame) {
        return
      }

      frame.style.height = `${Math.max(180, event.data.height)}px`
    })

    renderDemos()
    showPage(mainNav.getAttribute('value') || 'Components')
  </script>
</body>
</html>
