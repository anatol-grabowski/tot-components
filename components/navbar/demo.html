<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>compact-navbar demo</title>
  <style>
    :root {
      color: #222;
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      font-size: 14px;
      line-height: 1.4;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 12px;
    }
    body.embedded {
      padding: 0;
    }
    main {
      display: grid;
      gap: 10px;
      max-width: 900px;
      margin: 0 auto;
    }
    body.embedded main {
      max-width: none;
    }
    h1,
    h2,
    p {
      margin: 0;
    }
    h1 {
      font-size: 20px;
    }
    h2 {
      font-size: 15px;
      margin-bottom: 6px;
    }
    .intro {
      display: grid;
      gap: 4px;
    }
    .demo-card {
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px;
      display: grid;
      gap: 8px;
      overflow: hidden;
      background: #fff;
    }
    .log {
      min-height: 28px;
      padding: 5px 7px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #fafafa;
      color: #555;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .slot-title {
      font-weight: 600;
      white-space: nowrap;
    }
    .slot-button {
      border: 1px solid #999;
      border-radius: 4px;
      background: #fff;
      height: 28px;
      padding: 0 8px;
      cursor: pointer;
    }
    .wide-box {
      width: 680px;
      max-width: 100%;
    }
  </style>
</head>
<body>
  <main>
    <section class="intro">
      <h1>compact-navbar</h1>
      <p>Compact top navigation with left and right slots, horizontal overflow, and a bubbling change event.</p>
    </section>

    <section class="demo-card">
      <h2>Basic tabs</h2>
      <compact-navbar id="basic" tabs="Home,Search,Settings" value="Search"></compact-navbar>
      <div class="log" id="basicLog">Waiting for change...</div>
    </section>

    <section class="demo-card">
      <h2>With slotted title and action</h2>
      <compact-navbar
        id="slotted"
        tabs='[{"label":"Overview","value":"overview"},{"label":"Reports","value":"reports"},{"label":"Settings","value":"settings"}]'
        value="reports"
      >
        <span class="slot-title" slot="left">Demo App</span>
        <button class="slot-button" slot="right" type="button">⚙</button>
      </compact-navbar>
      <div class="log" id="slottedLog">Waiting for change...</div>
    </section>

    <section class="demo-card">
      <h2>Many tabs in a narrow container</h2>
      <div class="wide-box">
        <compact-navbar
          id="overflow"
          tabs='[{"label":"Alpha","value":"a"},{"label":"Beta","value":"b"},{"label":"Gamma","value":"g"},{"label":"Delta","value":"d"},{"label":"Epsilon","value":"e"},{"label":"Zeta","value":"z"},{"label":"Eta","value":"eta"},{"label":"Theta","value":"theta"}]'
          value="e"
        ></compact-navbar>
      </div>
      <div class="log" id="overflowLog">Waiting for change...</div>
    </section>
  </main>

  <script type="module">
    import './CompactNavbar.js'

    const embedded = window.parent !== window

    if (embedded) {
      document.body.classList.add('embedded')
    }

    function postHeight() {
      if (!embedded) {
        return
      }

      window.parent.postMessage({
        type: 'compact-component-demo-height',
        path: window.location.pathname.split('/').slice(-2).join('/'),
        height: Math.ceil(document.documentElement.scrollHeight),
      }, '*')
    }

    const resizeObserver = new ResizeObserver(() => postHeight())
    resizeObserver.observe(document.documentElement)
    window.addEventListener('load', postHeight)

    function wireLog(componentId, logId) {
      const component = document.getElementById(componentId)
      const log = document.getElementById(logId)

      component.addEventListener('change', event => {
        log.textContent = JSON.stringify(event.detail, null, 2)
      })
    }

    wireLog('basic', 'basicLog')
    wireLog('slotted', 'slottedLog')
    wireLog('overflow', 'overflowLog')
  </script>
</body>
</html>
